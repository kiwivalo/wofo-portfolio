<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Wofo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f8f8;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --accent: #e63946;
      --accent-hover: #c1121f;
      --accent-glow: rgba(230, 57, 70, 0.5);
      --border: #e5e5e5;
      --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      --card-radius: 16px;
      --font-main: 'Inter', sans-serif;
    }

    [data-theme="dark"] {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-card: #1a1a1a;
      --text-primary: #ffffff;
      --text-secondary: #999999;
      --accent: #e63946;
      --accent-hover: #ff4d5a;
      --accent-glow: rgba(230, 57, 70, 0.6);
      --border: #2a2a2a;
      --card-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    [data-theme="synthwave"] {
      --bg-primary: #0d0221;
      --bg-secondary: #1a0533;
      --bg-card: #1a0533;
      --text-primary: #ff00ff;
      --text-secondary: #00ffff;
      --accent: #ff00ff;
      --accent-hover: #ff66ff;
      --accent-glow: rgba(255, 0, 255, 0.6);
      --border: #4a1259;
      --card-shadow: 0 4px 30px rgba(255, 0, 255, 0.3);
    }

    [data-theme="ocean"] {
      --bg-primary: #0a192f;
      --bg-secondary: #112240;
      --bg-card: #112240;
      --text-primary: #ccd6f6;
      --text-secondary: #8892b0;
      --accent: #64ffda;
      --accent-hover: #9efff2;
      --accent-glow: rgba(100, 255, 218, 0.5);
      --border: #233554;
      --card-shadow: 0 4px 30px rgba(100, 255, 218, 0.1);
    }

    [data-theme="forest"] {
      --bg-primary: #1a1f16;
      --bg-secondary: #252b1f;
      --bg-card: #2d3628;
      --text-primary: #e8f5e9;
      --text-secondary: #a5d6a7;
      --accent: #69f0ae;
      --accent-hover: #b9f6ca;
      --accent-glow: rgba(105, 240, 174, 0.5);
      --border: #3d4a35;
      --card-shadow: 0 4px 30px rgba(105, 240, 174, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
      position: relative;
    }

    .cursor-glow { position: fixed; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); pointer-events: none; z-index: 0; opacity: 0; transform: translate(-50%, -50%); transition: opacity 0.3s ease; }
    .cursor-glow.active { opacity: 0.3; }

    .bg-effects { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle { position: absolute; border-radius: 50%; opacity: 0.4; animation: float linear infinite; }
    @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.4; } 90% { opacity: 0.4; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
    .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.3; }
    .gradient-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: orbFloat 20s ease-in-out infinite; }
    @keyframes orbFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 25% { transform: translate(30px, -50px) scale(1.1); } 50% { transform: translate(-20px, 20px) scale(0.9); } 75% { transform: translate(50px, 10px) scale(1.05); } }

    .container { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 50px 20px 80px; }

    .header { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.8s ease-out; }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes glitch { 0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); } 20% { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 2px); } 40% { clip-path: inset(40% 0 40% 0); transform: translate(2px, -2px); } 60% { clip-path: inset(60% 0 20% 0); transform: translate(-1px, 1px); } 80% { clip-path: inset(80% 0 5% 0); transform: translate(1px, -1px); } }

    .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 50px; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--card-shadow); transition: all 0.3s ease; z-index: 1000; }
    .theme-toggle:hover { transform: scale(1.1); border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .theme-toggle svg { width: 24px; height: 24px; fill: var(--text-primary); }

    .profile-container { margin-bottom: 35px; animation: fadeInUp 0.8s ease-out 0.1s both; }
    .profile-img { width: 140px; height: 140px; object-fit: cover; border: 4px solid var(--accent); box-shadow: 0 0 40px var(--accent-glow); margin: 0 auto 20px; display: block; transition: all 0.4s ease; animation: scaleIn 0.6s ease-out 0.2s both; }
    .profile-img.circle { border-radius: 50%; }
    .profile-img.square { border-radius: 16px; }
    .profile-img.hexagon { clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); border-radius: 0; }
    .profile-img:hover { transform: scale(1.08); box-shadow: 0 0 60px var(--accent-glow); }
    .profile-name { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; text-align: center; }
    .profile-name.glitch { position: relative; }
    .profile-name.glitch:hover { animation: glitch 0.3s ease infinite; }
    .profile-username { font-size: 1.1rem; color: var(--accent); font-weight: 600; margin-bottom: 12px; text-align: center; }
    .profile-bio { font-size: 1rem; color: var(--text-secondary); line-height: 1.7; max-width: 400px; margin: 0 auto; text-align: center; }
    .greeting-text { font-size: 0.9rem; color: var(--accent); font-weight: 500; margin-bottom: 8px; font-style: italic; text-align: center; }

    .music-player { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 20px; margin-bottom: 30px; box-shadow: var(--card-shadow); animation: fadeInUp 0.8s ease-out 0.15s both; }
    .music-player h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .music-player h3::before { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }
    .music-player audio { width: 100%; height: 44px; border-radius: 8px; }
    .music-visualizer { display: flex; align-items: flex-end; justify-content: center; gap: 3px; height: 30px; margin-top: 12px; }
    .viz-bar { width: 4px; background: var(--accent); border-radius: 2px; animation: visualize 0.5s ease-in-out infinite alternate; }
    @keyframes visualize { from { height: 5px; } to { height: 25px; } }

    .views-section { text-align: center; margin: 20px 0; animation: fadeInUp 0.8s ease-out 0.2s both; }
    .views-section h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-secondary); margin-bottom: 12px; }
    .view-count { font-size: 3rem; font-weight: 800; color: var(--accent); }

    .links-section { animation: fadeInUp 0.8s ease-out 0.25s both; }
    .links-section h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-secondary); margin-bottom: 20px; text-align: center; }

    .link-card { display: flex; align-items: center; gap: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 16px 20px; margin-bottom: 12px; text-decoration: none; color: var(--text-primary); box-shadow: var(--card-shadow); transition: all 0.3s ease; position: relative; overflow: hidden; }
    .link-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--accent); transform: scaleY(0); transition: transform 0.3s ease; }
    .link-card:hover { transform: translateX(8px); border-color: var(--accent); box-shadow: 0 8px 40px var(--accent-glow); }
    .link-card:hover::before { transform: scaleY(1); }
    .link-card.pill { border-radius: 50px; padding: 14px 24px; justify-content: center; }
    .link-card.compact { padding: 12px 16px; }
    .link-card.minimal { background: transparent; border: none; box-shadow: none; padding: 8px 0; }
    .link-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); flex-shrink: 0; transition: all 0.3s ease; }
    .link-card:hover .link-icon { background: var(--accent); }
    .link-icon svg { width: 26px; height: 26px; fill: var(--accent); transition: fill 0.3s ease; }
    .link-card:hover .link-icon svg { fill: white; }
    .link-content { flex: 1; }
    .link-title { font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
    .link-desc { font-size: 0.85rem; color: var(--text-secondary); }

    .spotify-section { display: grid; gap: 16px; margin-top: 20px; }
    .spotify-embed { border-radius: 12px; overflow: hidden; background: var(--bg-card); }

    .footer { text-align: center; margin-top: 50px; padding-top: 30px; border-top: 1px solid var(--border); animation: fadeInUp 0.8s ease-out 0.3s both; }
    .footer p { font-size: 0.85rem; color: var(--text-secondary); }

    .admin-btn { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; border: none; border-radius: 50px; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px var(--accent-glow); transition: all 0.3s ease; z-index: 1000; opacity: 0.5; }
    .admin-btn:hover { transform: scale(1.15); opacity: 1; }
    .admin-btn svg { width: 24px; height: 24px; fill: white; }

    @media (max-width: 480px) {
      .container { padding: 40px 16px 70px; }
      .profile-name { font-size: 2rem; }
      .profile-img { width: 110px; height: 110px; }
      .view-count { font-size: 2rem; }
      .link-card { padding: 14px 16px; }
      .link-icon { width: 42px; height: 42px; }
    }
  </style>
</head>
<body>
  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="bg-effects" id="bgEffects"></div>

  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
    <svg id="themeIcon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
  </button>

  <div class="container">
    <header class="header">
      <div class="profile-container">
        <p class="greeting-text" id="greetingText" style="display: none;"></p>
        <img src="/images/profile.png" alt="Profile" class="profile-img" id="profileImg">
        <h1 class="profile-name" id="displayName">Wofo</h1>
        <p class="profile-username" id="username">@Wofo</p>
        <p class="profile-bio" id="bio">i like games or i like certain artists</p>
      </div>
    </header>

    <div class="music-player" id="musicSection" style="display: none;">
      <h3>Now Playing</h3>
      <audio id="musicPlayer" controls><source src="" type="audio/mpeg"></audio>
      <div class="music-visualizer" id="visualizer"></div>
    </div>

    <div class="views-section" id="viewsSection" style="display: none;">
      <h3>Views</h3>
      <div class="view-count" id="viewCount">0</div>
    </div>

    <section class="links-section">
      <h3>Connect</h3>
      <div id="linksContainer"></div>
    </section>

    <div id="spotifySection" style="display: none; margin-top: 20px;">
      <h3 style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-secondary); margin-bottom: 16px; text-align: center;">Spotify Playlist</h3>
      <div class="spotify-section" id="spotifyEmbeds"></div>
    </div>

    <footer class="footer">
      <p>&copy; 2026 <span id="footerName">Wofo</span></p>
    </footer>
  </div>

  <button class="admin-btn" onclick="window.location.href='/admin'" title="Admin">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
  </button>

  <script>
    let currentTheme = localStorage.getItem('wofo-theme') || 'light';
    let settings = {};

    function toggleTheme() {
      const themes = ['light', 'dark', 'synthwave', 'ocean', 'forest'];
      const currentIndex = themes.indexOf(currentTheme);
      currentTheme = themes[(currentIndex + 1) % themes.length];
      applyTheme();
      localStorage.setItem('wofo-theme', currentTheme);
    }

    function applyTheme() {
      document.documentElement.setAttribute('data-theme', currentTheme);
      document.getElementById('themeIcon').innerHTML = currentTheme === 'light' 
        ? '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>'
        : '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>';
    }

    function createBackgroundEffects() {
      const container = document.getElementById('bgEffects');
      container.innerHTML = '';
      if (settings.backgroundEffect === 'particles') {
        for (let i = 0; i < 30; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;background:var(--accent);animation-delay:${Math.random()*15}s;animation-duration:${10+Math.random()*15}s`;
          container.appendChild(p);
        }
      } else if (settings.backgroundEffect === 'grid') {
        container.innerHTML = '<div class="grid-bg"></div>';
      } else if (settings.backgroundEffect === 'gradientOrbs') {
        const orb1 = document.createElement('div');
        orb1.className = 'gradient-orb';
        orb1.style.cssText = 'width:400px;height:400px;background:var(--accent);top:10%;left:10%';
        container.appendChild(orb1);
        const orb2 = orb1.cloneNode();
        orb2.style.cssText = 'width:300px;height:300px;background:var(--accent);bottom:20%;right:10%;animation-delay:-10s';
        container.appendChild(orb2);
      }
    }

    function initCursorGlow() {
      if (settings.cursorGlow === 'true') {
        const glow = document.getElementById('cursorGlow');
        glow.classList.add('active');
        document.addEventListener('mousemove', e => {
          glow.style.left = e.clientX + 'px';
          glow.style.top = e.clientY + 'px';
        });
      }
    }

    function createVisualizer() {
      const viz = document.getElementById('visualizer');
      viz.innerHTML = '';
      for (let i = 0; i < 20; i++) {
        const bar = document.createElement('div');
        bar.className = 'viz-bar';
        bar.style.animationDelay = (i * 0.05) + 's';
        viz.appendChild(bar);
      }
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const stats = await res.json();
        document.getElementById('viewCount').textContent = (stats.viewCount || 0).toLocaleString();
      } catch (err) {}
    }

    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        settings = await res.json();
        
        document.getElementById('displayName').textContent = settings.displayName || 'Wofo';
        document.getElementById('username').textContent = '@' + (settings.username || 'Wofo');
        document.getElementById('bio').textContent = settings.bio || '';
        document.getElementById('footerName').textContent = settings.footerName || 'Wofo';
        document.getElementById('pageTitle').textContent = settings.customTitle || 'Wofo';
        
        if (settings.profileImage) document.getElementById('profileImg').src = settings.profileImage;
        
        const img = document.getElementById('profileImg');
        img.className = 'profile-img ' + (settings.profileShape || 'circle');
        
        if (settings.glitchEffect === 'true') document.getElementById('displayName').classList.add('glitch');
        
        if (settings.greetingText) {
          const g = document.getElementById('greetingText');
          g.textContent = settings.greetingText;
          g.style.display = 'block';
        }
        
        if (settings.musicUrl) {
          document.getElementById('musicPlayer').src = settings.musicUrl;
          document.getElementById('musicSection').style.display = 'block';
          createVisualizer();
        }
        
        if (settings.showViews === 'true') {
          document.getElementById('viewsSection').style.display = 'block';
          loadStats();
        }
        
        if (settings.theme) currentTheme = settings.theme;
        applyTheme();
        if (settings.backgroundEffect !== 'none') createBackgroundEffects();
        initCursorGlow();
        if (settings.fontFamily) document.body.style.fontFamily = `'${settings.fontFamily}', sans-serif`;
        
        renderLinks(settings);
        renderSpotifyEmbeds(settings);
      } catch (err) {}
    }

    function renderLinks(settings) {
      const container = document.getElementById('linksContainer');
      container.innerHTML = '';
      const linkStyle = settings.linkStyle || 'card';
      const links = [
        { key: 'youtubeUrl', title: 'YouTube', desc: 'Watch my videos', icon: 'youtube' },
        { key: 'instagramUrl', title: 'Instagram', desc: 'Follow on Instagram', icon: 'instagram' },
        { key: 'githubUrl', title: 'GitHub', desc: 'Check my repos', icon: 'github' },
        { key: 'steamUrl', title: 'Steam', desc: 'Game with me', icon: 'steam' },
        { key: 'spotifyProfileUrl', title: 'Spotify', desc: 'Listen to my music', icon: 'spotify' },
        { key: 'tiktokUrl', title: 'TikTok', desc: 'Watch my content', icon: 'tiktok' }
      ];
      
      links.forEach(link => {
        if (settings[link.key]) {
          const card = document.createElement('a');
          card.href = settings[link.key];
          card.target = '_blank';
          card.className = `link-card ${linkStyle}`;
          card.innerHTML = `<div class="link-icon">${getIcon(link.icon)}</div><div class="link-content"><div class="link-title">${link.title}</div><div class="link-desc">${link.desc}</div></div>`;
          container.appendChild(card);
        }
      });
    }

    function renderSpotifyEmbeds(settings) {
      const section = document.getElementById('spotifySection');
      const container = document.getElementById('spotifyEmbeds');
      container.innerHTML = '';
      
      if (settings.spotifyPlaylistUrl) {
        const id = extractSpotifyId(settings.spotifyPlaylistUrl);
